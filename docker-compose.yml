services:
  postgres:
    image: postgres:16-alpine
    container_name: guardivex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: guardivex
      POSTGRES_PASSWORD: guardivex
      POSTGRES_DB: guardivex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardivex -d guardivex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: guardivex-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: guardivex-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://guardivex:guardivex@postgres:5432/guardivex?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://app.guardivex.com,https://www.guardivex.com}
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: guardivex-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://guardivex:guardivex@postgres:5432/guardivex?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://app.guardivex.com,https://www.guardivex.com}
    command: ["node", "apps/api/dist/worker.js"]

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: guardivex-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://guardivex:guardivex@postgres:5432/guardivex?schema=public
    command: ["./node_modules/.bin/prisma", "migrate", "deploy", "--schema", "packages/database/prisma/schema.prisma"]

volumes:
  postgres-data:
  redis-data:
