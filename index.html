<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Guardivex Security Platform</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
        (function () {
            try {
                var key = "sentinelgrid-theme";
                var rawTheme = window.localStorage.getItem(key);
                var storedTheme = null;

                if (rawTheme !== null) {
                    try {
                        storedTheme = JSON.parse(rawTheme);
                    } catch (parseError) {
                        storedTheme = rawTheme;
                    }
                }

                var theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "dark";
                var root = document.documentElement;
                root.classList.remove("light", "dark");
                root.classList.add(theme);
                root.style.colorScheme = theme;
                if (rawTheme === null || storedTheme !== theme) {
                    window.localStorage.setItem(key, JSON.stringify("dark"));
                }
            } catch (error) {
                document.documentElement.classList.add("dark");
                document.documentElement.style.colorScheme = "dark";
            }
        })();
    </script>
    <link href="/src/main.css" rel="stylesheet" />
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
